<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turfe Amigo</title>
</head>

<body>
    <button onclick="volta()">Volta</button>
    <div id="msg_tela"></div>
</body>

</html>
<script>
    let rodadas = {
        cavalo1: [],
        cavalo2: [],
        cavalo3: [],
        cavalo4: [],
        cavalo5: []
    }

    let tempoTotal = {
        cavalo1: 0,
        cavalo2: 0,
        cavalo3: 0,
        cavalo4: 0,
        cavalo5: 0
    }

    var cont = 1;

    function volta() {
        if (cont <= 7) {
            for (let i = 1; i < 6; i++) {
                let cavalo = Number((Math.random() * 2 + 7).toFixed(1))
                rodadas[`cavalo${i}`].push(cavalo);

                tempoTotal[`cavalo${i}`] += cavalo
            }
            visualizar()
        } else {
            resultado();
        }

        cont++
    }

    function visualizar() {
        msg_tela.innerHTML += `<br>Volta ${cont} <br>`
        for (let i = 1; i < 6; i++) {
            msg_tela.innerHTML += ` – Cavalo${i} – ${rodadas[`cavalo${i}`][cont - 1]} – ${tempoTotal[`cavalo${i}`].toFixed(1)}`
        }
    }

    function resultado() {
        let first = ['']
        let second = ['']
        let third = ['']
        let tempofirst = [99]
        let temposecond = [99]
        let tempothird = [99]

        for (let i = 1; i < 6; i++) {
            if (tempofirst[0] > tempoTotal[`cavalo${i}`]) {
                first[0] = [`cavalo${i}`]
                tempofirst[0] = tempoTotal[`cavalo${i}`]
            } else if (tempofirst[0] == tempoTotal[`cavalo${i}`]) {
                first.push([`cavalo${i}`])
                tempofirst.push(tempoTotal[`cavalo${i}`])
            }

            else if (temposecond[0] > tempoTotal[`cavalo${i}`]) {
                second[0] = [`cavalo${i}`]
                temposecond[0] = tempoTotal[`cavalo${i}`]
            } else if (temposecond[0] == tempoTotal[`cavalo${i}`]) {
                second.push([`cavalo${i}`])
                temposecond.push(tempoTotal[`cavalo${i}`])
            }
            
            else if (tempothird[0] > tempoTotal[`cavalo${i}`]) {
                third[0] = [`cavalo${i}`]
                tempothird[0] = tempoTotal[`cavalo${i}`]
            } else if (tempothird[0] == tempoTotal[`cavalo${i}`]) {
                third.push([`cavalo${i}`])
                tempothird.push(tempoTotal[`cavalo${i}`])
            }
        }

        if (first.length >= 3) {
            
        }
        console.log(first)
        console.log(second)
        console.log(third)
    }
</script>
